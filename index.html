<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pusat Media Operasional KA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

/* LANDING PAGE */

#landing{
position:fixed;
width:100%;
height:100%;
background:url('https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/wp10514716-kereta-api-indonesia-wallpapers.jpg') no-repeat center center/cover;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
transition:opacity .8s ease;
}

#landing.hidden{
opacity:0;
pointer-events:none;
}

#landing::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:black;
opacity:.25;
top:0;
left:0;
z-index:1;
}

.overlay{
z-index:2;
position:relative;
width:100%;
text-align:center;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100%;
}

.overlay h1{
font-size:2.5em;
margin-bottom:20px;
}

#enterBtn{
padding:10px 30px;
font-size:1.2em;
cursor:pointer;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
}

.landing-logo{
position:absolute;
top:20px;
height:70px;
z-index:2;
}

.landing-logo.left{left:20px;}
.landing-logo.right{right:20px;}

/* BODY */

body{
font-family:Arial;
background:#0f172a;
color:#e5e7eb;
margin:0;
padding:10px;
}

.header-logo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
gap:10px;
margin-bottom:10px;
}

.logo{
height:50px;
object-fit:contain;
justify-self:center;
}

h1{
text-align:center;
margin:5px 0;
font-size:1.4rem;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin:4px 0 10px 0;
font-size:.9rem;
}

/* TABS */

.tabs{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.tab{
padding:8px 14px;
border-radius:999px;
background:#020617;
border:1px solid #334155;
cursor:pointer;
font-size:.9rem;
}

.tab.active{
background:#2563eb;
}

.tab-content{
display:none;
margin-top:15px;
}

.tab-content.active{
display:block;
}

/* VIDEO */

.video-layout{
display:flex;
flex-direction:column;
gap:15px;
}

.playlist{
background:#020617;
border:1px solid #334155;
border-radius:12px;
max-height:300px;
overflow-y:auto;
}

.playlist-item{
padding:10px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.playlist-item:hover{
background:#1e293b;
}

.playlist-item.active{
background:#2563eb;
}

.player-wrapper{
position:relative;
width:100%;
padding-top:56.25%;
background:black;
border-radius:12px;
overflow:hidden;
}

.player-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* PDF LIST */

.pdf-list{
background:#020617;
border:1px solid #334155;
border-radius:12px;
max-height:220px;
overflow-y:auto;
margin-bottom:10px;
}

.pdf-item{
padding:10px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.pdf-item:hover{
background:#1e293b;
}

/* FOOTER */

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#94a3b8;
}

/* PDF POPUP VIEWER */

#pdfModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:99999;
}

.pdf-modal-content{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
background:#111;
}

.pdf-topbar{
display:flex;
align-items:center;
gap:10px;
padding:8px;
background:#020617;
border-bottom:1px solid #334155;
color:white;
}

.pdf-topbar button{
background:#1e293b;
border:1px solid #334155;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

#closePdf{
margin-left:auto;
background:#ef4444;
}

#pdfFrame{
flex:1;
width:100%;
border:none;
}

</style>
</head>

<body>

<!-- LANDING -->

<div id="landing">

<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-danantara.png" class="landing-logo left">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo%20KAI.png" class="landing-logo right">

<div class="overlay">
<h1>SELAMAT DATANG DI LABORATORIUM PUSDALOPKA 2 BANDUNG</h1>
<button id="enterBtn">Masuk</button>
</div>

</div>

<header>

<div class="header-logo">

<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-danantara.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo-Tagline-Semakin-Melayani-White.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo-CITAR-2025-03-putih.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-KAI-orange-putih-1.png" class="logo">

</div>

<h1>🚆 Pusat Media Operasional KA</h1>
<p class="subtitle">Video • Peraturan • Informasi Penting</p>

</header>

<div class="tabs">

<div class="tab active" data-tab="video">🎬 VIDEO</div>
<div class="tab" data-tab="pdf">📄 PERATURAN DINAS</div>
<div class="tab" data-tab="wad">📌 WAD PENTING</div>

</div>

<!-- VIDEO -->

<div class="tab-content active" id="video">

<div class="video-layout">

<div class="playlist" id="playlist">Loading...</div>

<div class="player-wrapper">
<iframe id="player"></iframe>
</div>

</div>

</div>

<!-- PDF -->

<div class="tab-content" id="pdf">

<div class="pdf-list" id="pdfList">Loading PDF...</div>

</div>

<!-- WAD -->

<div class="tab-content" id="wad">
<div style="text-align:center;padding:50px;color:#94a3b8">
🚧 Konten WAD Penting
</div>
</div>

<footer class="footer">
© 2026 • Achmad Teguh Ginanjar | 61762
</footer>

<!-- PDF POPUP -->

<div id="pdfModal">

<div class="pdf-modal-content">

<div class="pdf-topbar">

<button onclick="prevPage()">◀</button>
<span id="pageInfo">Page 1</span>
<button onclick="nextPage()">▶</button>

<button onclick="zoomOutPdf()">➖</button>
<button onclick="zoomInPdf()">➕</button>

<button onclick="downloadPdf()">⬇</button>

<button id="closePdf">✕</button>

</div>

<iframe id="pdfFrame"></iframe>

</div>

</div>

<script>

/* VIDEO */

const playlist=document.getElementById("playlist");
const player=document.getElementById("player");

const VIDEO_API="https://raw.githubusercontent.com/ginanjarachmad4-del/youtube-json/main/videos.json?v="+Date.now();

fetch(VIDEO_API)
.then(r=>r.json())
.then(data=>{

playlist.innerHTML="";

data.forEach((v,i)=>{

const item=document.createElement("div");

item.className="playlist-item";
item.textContent=v.nama;

item.onclick=()=>{

document.querySelectorAll(".playlist-item").forEach(x=>x.classList.remove("active"));

item.classList.add("active");

player.src=v.file;

};

if(i===0){
item.classList.add("active");
player.src=v.file;
}

playlist.appendChild(item);

});

});

/* PDF LIST */

fetch("data/pdf.json")
.then(r=>r.json())
.then(data=>{

const list=document.getElementById("pdfList");

list.innerHTML="";

data.forEach(p=>{

const d=document.createElement("div");

d.className="pdf-item";
d.textContent="📄 "+p.nama;

d.onclick=()=>openPDF(p.file);

list.appendChild(d);

});

});

/* PDF VIEWER */

let currentPdf="";
let currentPage=1;
let pdfZoom=1;

function openPDF(url){

currentPdf=url;
currentPage=1;
pdfZoom=1;

const frame=document.getElementById("pdfFrame");

frame.src=url+"#page=1&zoom=page-width";

document.getElementById("pdfModal").style.display="block";

updatePageInfo();

}

function updatePageInfo(){
document.getElementById("pageInfo").innerText="Page "+currentPage;
}

function nextPage(){
currentPage++;
updateFrame();
}

function prevPage(){
if(currentPage>1){
currentPage--;
updateFrame();
}
}

function zoomInPdf(){
pdfZoom+=0.2;
updateFrame();
}

function zoomOutPdf(){
pdfZoom=Math.max(0.5,pdfZoom-0.2);
updateFrame();
}

function updateFrame(){

const frame=document.getElementById("pdfFrame");

frame.src=currentPdf+"#page="+currentPage+"&zoom="+(pdfZoom*100);

updatePageInfo();

}

function downloadPdf(){
window.open(currentPdf);
}

document.getElementById("closePdf").onclick=()=>{
document.getElementById("pdfModal").style.display="none";
document.getElementById("pdfFrame").src="";
};

/* TABS */

document.querySelectorAll(".tab").forEach(tab=>{

tab.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

tab.classList.add("active");

document.getElementById(tab.dataset.tab).classList.add("active");

};

});

/* LANDING */

document.getElementById("enterBtn").onclick=()=>{

const landing=document.getElementById("landing");

landing.classList.add("hidden");

setTimeout(()=>{
landing.style.display="none";
},800);

};

</script>

</body>
</html>
