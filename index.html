<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pusat Media Operasional KA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

/* LANDING PAGE */

#landing{
position:fixed;
width:100%;
height:100%;
background:url('https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/wp10514716-kereta-api-indonesia-wallpapers.jpg') no-repeat center center/cover;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
transition:opacity .8s ease;
}

#landing.hidden{
opacity:0;
pointer-events:none;
}

#landing::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:black;
opacity:.25;
top:0;
left:0;
z-index:1;
}

.overlay{
z-index:2;
position:relative;
width:100%;
text-align:center;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100%;
}

.overlay h1{
font-size:2.5em;
margin-bottom:20px;
}

#enterBtn{
padding:10px 30px;
font-size:1.2em;
cursor:pointer;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
}

.landing-logo{
position:absolute;
top:20px;
height:70px;
z-index:2;
}

.landing-logo.left{left:20px;}
.landing-logo.right{right:20px;}

/* BODY */

body{
font-family:Arial;
background:#0f172a;
color:#e5e7eb;
margin:0;
padding:10px;
}

.header-logo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
gap:10px;
margin-bottom:10px;
}

.logo{
height:50px;
object-fit:contain;
justify-self:center;
}

h1{
text-align:center;
margin:5px 0;
font-size:1.4rem;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin:4px 0 10px 0;
font-size:.9rem;
}

/* TABS */

.tabs{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.tab{
padding:8px 14px;
border-radius:999px;
background:#020617;
border:1px solid #334155;
cursor:pointer;
font-size:.9rem;
}

.tab.active{
background:#2563eb;
}

.tab-content{
display:none;
margin-top:15px;
}

.tab-content.active{
display:block;
}

/* VIDEO */

.video-layout{
display:flex;
flex-direction:column;
gap:15px;
}

.playlist{
background:#020617;
border:1px solid #334155;
border-radius:12px;
max-height:300px;
overflow-y:auto;
}

.playlist-item{
padding:10px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.playlist-item:hover{
background:#1e293b;
}

.playlist-item.active{
background:#2563eb;
}

.player-wrapper{
position:relative;
width:100%;
padding-top:56.25%;
background:black;
border-radius:12px;
overflow:hidden;
}

.player-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* PDF */

.pdf-list{
background:#020617;
border:1px solid #334155;
border-radius:12px;
max-height:220px;
overflow-y:auto;
margin-bottom:10px;
}

.pdf-item{
padding:10px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.pdf-item:hover{
background:#1e293b;
}

.pdf-container{
display:flex;
flex-direction:column;
background:#020617;
border:1px solid #334155;
border-radius:12px;
overflow:hidden;
}

.toolbar{
display:flex;
gap:6px;
padding:8px;
border-bottom:1px solid #334155;
}

.toolbar button{
background:#1e293b;
color:#e5e7eb;
border:1px solid #334155;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.pdf-viewer{
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
align-items:center;
touch-action:pan-x pan-y;
}

canvas{
max-width:100%;
margin-bottom:10px;
background:white;
}

/* FULLSCREEN */

.pdf-container:fullscreen{
width:100vw;
height:100vh;
}

/* FOOTER */

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#94a3b8;
}

</style>
</head>

<body>

<!-- LANDING -->

<div id="landing">

<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-danantara.png" class="landing-logo left">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo%20KAI.png" class="landing-logo right">

<div class="overlay">
<h1>SELAMAT DATANG DI LABORATORIUM PUSDALOPKA 2 BANDUNG</h1>
<button id="enterBtn">Masuk</button>
</div>

</div>

<header>

<div class="header-logo">

<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-danantara.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo-Tagline-Semakin-Melayani-White.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo-CITAR-2025-03-putih.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-KAI-orange-putih-1.png" class="logo">

</div>

<h1>🚆 Pusat Media Operasional KA</h1>
<p class="subtitle">Video • Peraturan • Informasi Penting</p>

</header>

<div class="tabs">

<div class="tab active" data-tab="video">🎬 VIDEO</div>
<div class="tab" data-tab="pdf">📄 PERATURAN DINAS</div>
<div class="tab" data-tab="wad">📌 WAD PENTING</div>

</div>

<!-- VIDEO -->

<div class="tab-content active" id="video">

<div class="video-layout">

<div class="playlist" id="playlist">Loading...</div>

<div class="player-wrapper">
<iframe id="player"></iframe>
</div>

</div>

</div>

<!-- PDF -->

<div class="tab-content" id="pdf">

<div class="pdf-list" id="pdfList">Loading PDF...</div>

<div class="pdf-container">

<div class="toolbar">
<button onclick="zoomOut()">➖</button>
<button onclick="zoomIn()">➕</button>
<button onclick="toggleFullscreen()">⛶</button>
</div>

<div class="pdf-viewer" id="pdfViewer">
<p style="color:#94a3b8">Pilih PDF</p>
</div>

</div>

</div>

<!-- WAD -->

<div class="tab-content" id="wad">
<div style="text-align:center;padding:50px;color:#94a3b8">
🚧 Konten WAD Penting
</div>
</div>

<footer class="footer">
© 2026 • Achmad Teguh Ginanjar | 61762
</footer>

<script>

const playlist=document.getElementById("playlist");
const player=document.getElementById("player");

let pdfDoc=null;
let userScale=1;

pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* VIDEO */

const VIDEO_API="https://raw.githubusercontent.com/ginanjarachmad4-del/youtube-json/main/videos.json?v="+Date.now();

fetch(VIDEO_API)
.then(r=>r.json())
.then(data=>{

playlist.innerHTML="";

data.forEach((v,i)=>{

const item=document.createElement("div");

item.className="playlist-item";
item.textContent=v.nama;

item.onclick=()=>{

document.querySelectorAll(".playlist-item").forEach(x=>x.classList.remove("active"));

item.classList.add("active");

player.src=v.file;

};

if(i===0){
item.classList.add("active");
player.src=v.file;
}

playlist.appendChild(item);

});

});

/* PDF LIST */

fetch("data/pdf.json")
.then(r=>r.json())
.then(data=>{

const list=document.getElementById("pdfList");

list.innerHTML="";

data.forEach(p=>{

const d=document.createElement("div");

d.className="pdf-item";
d.textContent="📄 "+p.nama;

d.onclick=()=>loadPDF(p.file);

list.appendChild(d);

});

});

/* LOAD PDF */

function loadPDF(url){

const viewer=document.getElementById("pdfViewer");

viewer.innerHTML="Loading PDF...";

pdfjsLib.getDocument(url).promise.then(pdf=>{

pdfDoc=pdf;

viewer.innerHTML="";

for(let i=1;i<=pdf.numPages;i++){

const canvas=document.createElement("canvas");

canvas.dataset.page=i;

viewer.appendChild(canvas);

renderPage(i,canvas);

}

});

}

/* RENDER PAGE */

function renderPage(num,canvas){

pdfDoc.getPage(num).then(page=>{

const containerWidth=document.querySelector(".pdf-container").clientWidth;

const viewport=page.getViewport({scale:1});

const scale=(containerWidth/viewport.width)*userScale;

const vp=page.getViewport({scale:scale});

canvas.width=vp.width;
canvas.height=vp.height;

page.render({

canvasContext:canvas.getContext("2d"),
viewport:vp

});

});

}

/* ZOOM */

function zoomIn(){

userScale+=0.2;
rerender();

}

function zoomOut(){

userScale=Math.max(0.4,userScale-0.2);
rerender();

}

function rerender(){

if(!pdfDoc)return;

const canvases=document.querySelectorAll("#pdfViewer canvas");

canvases.forEach(c=>{

renderPage(parseInt(c.dataset.page),c);

});

}

/* FULLSCREEN */

function toggleFullscreen(){

const el=document.querySelector(".pdf-container");

if(!document.fullscreenElement){

el.requestFullscreen();

}else{

document.exitFullscreen();

}

}

/* TABS */

document.querySelectorAll(".tab").forEach(tab=>{

tab.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

tab.classList.add("active");

document.getElementById(tab.dataset.tab).classList.add("active");

};

});

/* LANDING */

document.getElementById("enterBtn").onclick=()=>{

const landing=document.getElementById("landing");

landing.classList.add("hidden");

setTimeout(()=>{

landing.style.display="none";

},800);

};

</script>

</body>
</html>
