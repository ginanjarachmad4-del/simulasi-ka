<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pusat Media Operasional KA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:10px;}
.header-logo{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;margin-bottom:10px;}
.logo{height:50px;max-width:100%;object-fit:contain;justify-self:center;}
h1{text-align:center;margin:5px 0;font-size:1.4rem;}
.subtitle{text-align:center;color:#94a3b8;margin:4px 0 10px 0;font-size:0.9rem;}
.tabs{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-top:10px;}
.tab{padding:8px 14px;border-radius:999px;background:#020617;border:1px solid #334155;cursor:pointer;font-size:0.9rem;}
.tab.active{background:#2563eb;}
.tab-content{display:none;margin-top:15px;}
.tab-content.active{display:block;}
.video-layout{display:flex;flex-direction:column;gap:15px;}
.playlist{background:#020617;border:1px solid #334155;border-radius:12px;max-height:300px;overflow-y:auto;}
.playlist-item{padding:10px;border-bottom:1px solid #334155;cursor:pointer;font-size:0.9rem;}
.playlist-item:hover{background:#1e293b;}
.playlist-item.active{background:#2563eb;}
.player-wrapper{position:relative;width:100%;padding-top:56.25%;background:black;border-radius:12px;overflow:hidden;}
.player-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
#pdf{display:flex;flex-direction:column;gap:12px;}
.pdf-list{width:100%;max-height:200px;background:#020617;border:1px solid #334155;border-radius:12px;overflow-y:auto;}
.pdf-item{padding:10px;border-bottom:1px solid #334155;cursor:pointer;font-size:0.9rem;}
.pdf-item:hover{background:#1e293b;}
.pdf-item.active{background:#2563eb;}
.pdf-container{flex:1;display:flex;flex-direction:column;background:#020617;border:1px solid #334155;border-radius:12px;overflow:hidden;}
.toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border-bottom:1px solid #334155;}
.toolbar button,.toolbar input{background:#1e293b;color:#e5e7eb;border:1px solid #334155;padding:5px 8px;border-radius:6px;font-size:0.8rem;}
.toolbar input{width:50px;}
.pdf-viewer{flex:1;overflow-y:auto;padding:10px;background:#020617;display:flex;flex-direction:column;align-items:center;}
canvas{max-width:100%; height:auto; margin-bottom:10px; background:white;}
.footer{margin-top:20px;text-align:center;font-size:12px;color:#94a3b8;}
.pdf-container:fullscreen, 
.pdf-container:-webkit-full-screen, 
.pdf-container:-ms-fullscreen {
  width: 100vw !important;
  height: 100vh !important;
}
@media(max-width:768px){
  .video-layout{flex-direction:column;}
  #pdf{flex-direction:column;}
  .pdf-list{max-height:180px;}
}
</style>
</head>
<body>

<header>
<div class="header-logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-danantara.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo%20Tagline%20Semakin%20Melayani-White.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo%20CITAR%202025-03%20putih.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo%20KAI%20orange%20putih%20(1).png" class="logo">
</div>
<h1>🚆 Pusat Media Operasional KA</h1>
<p class="subtitle">Video • Peraturan • Informasi Penting</p>
</header>

<div class="tabs">
<div class="tab active" data-tab="video">🎬 VIDEO</div>
<div class="tab" data-tab="pdf">📄 PERATURAN DINAS</div>
<div class="tab" data-tab="wad">📌 WAD PENTING</div>
</div>

<!-- VIDEO -->
<div class="tab-content active" id="video">
<div class="video-layout">
<div class="playlist" id="playlist">Loading...</div>
<div class="player-wrapper">
<iframe id="player" src="" frameborder="0" allowfullscreen></iframe>
</div>
</div>
</div>

<!-- PDF -->
<div class="tab-content" id="pdf">
<div class="pdf-list" id="pdfList">Loading PDF...</div>
<div class="pdf-container">
<div class="toolbar">
<button onclick="zoomOut()">➖</button>
<button onclick="zoomIn()">➕</button>
<button onclick="toggleFullscreen()">⛶</button>
</div>
<div class="pdf-viewer" id="pdfViewer">
<p style="text-align:center;color:#94a3b8">Pilih PDF di kiri</p>
</div>
</div>
</div>

<!-- WAD -->
<div class="tab-content" id="wad">
<div style="text-align:center;padding:50px;color:#94a3b8">
🚧 Konten WAD Penting<br>
<small>(placeholder – siap dikembangkan)</small>
</div>
</div>

<footer class="footer">© 2026 • Achmad Teguh Ginanjar | 61762</footer>

<script>
const playlist = document.getElementById("playlist");
const player = document.getElementById("player");
let pdfDoc=null, userScale=1;
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const VIDEO_API="https://raw.githubusercontent.com/ginanjarachmad4-del/youtube-json/main/videos.json";
const PDF_API="data/pdf.json";

// VIDEO
fetch(VIDEO_API).then(r=>r.json()).then(data=>{
  playlist.innerHTML="";
  data.forEach((v,i)=>{
    const item=document.createElement("div");
    item.className="playlist-item";
    item.textContent=v.nama;
    item.onclick=()=>{
      document.querySelectorAll(".playlist-item").forEach(x=>x.classList.remove("active"));
      item.classList.add("active");
      player.src=v.file;
    }
    if(i===0){item.classList.add("active"); player.src=v.file;}
    playlist.appendChild(item);
  });
});

// PDF
fetch(PDF_API).then(r=>r.json()).then(data=>{
  const list=document.getElementById("pdfList"); list.innerHTML="";
  data.forEach(p=>{
    const d=document.createElement("div");
    d.className="pdf-item"; d.textContent="📄 "+p.nama;
    d.onclick=()=>loadPDF(p.file);
    list.appendChild(d);
  });
});

function loadPDF(url){
  pdfjsLib.getDocument(url).promise.then(pdf=>{
    pdfDoc=pdf;
    renderPDF();
  });
}

function renderPDF(){
  if(!pdfDoc) return;
  const viewer=document.getElementById("pdfViewer");
  viewer.innerHTML="";
  const containerWidth = document.querySelector(".pdf-container").clientWidth;
  for(let i=1;i<=pdfDoc.numPages;i++){
    pdfDoc.getPage(i).then(page=>{
      const viewport = page.getViewport({scale:1});
      const scaleToFit = containerWidth / viewport.width;
      const finalScale = userScale * scaleToFit;
      const vp = page.getViewport({scale:finalScale});
      const canvas = document.createElement("canvas");
      canvas.width = vp.width;
      canvas.height = vp.height;
      canvas.style.maxWidth="100%";
      canvas.style.height="auto";
      viewer.appendChild(canvas);
      page.render({canvasContext:canvas.getContext("2d"),viewport:vp});
    });
  }
}

// Zoom
function zoomIn(){ userScale += 0.2; renderPDF(); }
function zoomOut(){ userScale = Math.max(0.2,userScale-0.2); renderPDF(); }

// Fullscreen
function toggleFullscreen(){
  const container=document.querySelector(".pdf-container");
  if(!document.fullscreenElement){
    container.requestFullscreen?.() || container.webkitRequestFullscreen?.() || container.msRequestFullscreen?.();
  } else {
    document.exitFullscreen?.() || document.webkitExitFullscreen?.() || document.msExitFullscreen?.();
  }
}

// ResizeObserver untuk mobile / fullscreen / rotate
const pdfContainer = document.querySelector(".pdf-container");
const ro = new ResizeObserver(() => {
  renderPDF();
});
ro.observe(pdfContainer);

// TAB
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab).classList.add("active");
  });
});
</script>

</body>
</html>
