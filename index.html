<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pusat Media Operasional KA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:20px;}
.header-logo{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:15px;}
.logo{height:70px;max-width:140px;object-fit:contain;justify-self:center;}
h1{text-align:center;margin:0}
.subtitle{text-align:center;color:#94a3b8;margin-top:6px}
.tabs{display:flex;justify-content:center;gap:10px;margin-top:20px;}
.tab{padding:10px 18px;border-radius:999px;background:#020617;border:1px solid #334155;cursor:pointer;}
.tab.active{background:#2563eb}
.tab-content{display:none;margin-top:20px}
.tab-content.active{display:block}
.video-layout{display:grid;grid-template-columns:320px 1fr;gap:20px;}
.playlist{background:#020617;border:1px solid #334155;border-radius:12px;max-height:520px;overflow-y:auto;}
.playlist-item{padding:14px;border-bottom:1px solid #334155;cursor:pointer;}
.playlist-item:hover{background:#1e293b}
.playlist-item.active{background:#2563eb}
.player-wrapper{position:relative;width:100%;padding-top:56.25%;background:black;border-radius:14px;overflow:hidden;}
.player-wrapper iframe, .player-wrapper video{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
#pdf{display:flex; height:calc(100vh - 260px); gap:16px;}
.pdf-list{width:300px;background:#020617;border:1px solid #334155;border-radius:12px;overflow-y:auto;}
.pdf-item{padding:14px;border-bottom:1px solid #334155;cursor:pointer;}
.pdf-item:hover{background:#1e293b}
.pdf-item.active{background:#2563eb}
.pdf-container{flex:1;display:flex;flex-direction:column;background:#020617;border:1px solid #334155;border-radius:12px;}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:10px;border-bottom:1px solid #334155;}
.toolbar button,.toolbar input{background:#1e293b;color:#e5e7eb;border:1px solid #334155;padding:6px 10px;border-radius:6px;}
.toolbar input{width:70px}
.pdf-viewer{flex:1;overflow-y:auto;padding:20px;}
canvas{display:block;margin:0 auto 20px;background:white;}
.footer{margin-top:40px;text-align:center;font-size:13px;color:#94a3b8;}
@media(max-width:768px){.video-layout{grid-template-columns:1fr} #pdf{flex-direction:column} .pdf-list{width:100%;max-height:200px}}
</style>
</head>
<body>
<header>
<div class="header-logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-danantara.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo%20Tagline%20Semakin%20Melayani-White.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo%20CITAR%202025-03%20putih.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo%20KAI%20orange%20putih%20(1).png" class="logo">
</div>
<h1>🚆 Pusat Media Operasional KA</h1>
<p class="subtitle">Video • Peraturan • Informasi Penting</p>
</header>

<div class="tabs">
<div class="tab active" data-tab="video">🎬 VIDEO</div>
<div class="tab" data-tab="pdf">📄 PERATURAN DINAS</div>
<div class="tab" data-tab="wad">📌 WAD PENTING</div>
</div>

<div class="tab-content active" id="video">
<div class="video-layout">
<div class="playlist" id="playlist">Loading...</div>
<div class="player-wrapper">
<video id="player" controls></video>
</div>
</div>
</div>

<div class="tab-content" id="pdf">
<div class="pdf-list" id="pdfList">Loading PDF...</div>
<div class="pdf-container">
<div class="toolbar">
<button onclick="prevPage()">⬅</button>
<button onclick="nextPage()">➡</button>
<input id="pageInput" type="number" min="1">
<button onclick="goPage()">Go</button>
<button onclick="zoomOut()">➖</button>
<button onclick="zoomIn()">➕</button>
<button onclick="toggleFullscreen()">⛶</button>
</div>
<div class="pdf-viewer" id="pdfViewer">
<p style="text-align:center;color:#94a3b8">Pilih PDF di kiri</p>
</div>
</div>
</div>

<div class="tab-content" id="wad">
<div style="text-align:center;padding:80px;color:#94a3b8">
🚧 Konten WAD Penting<br>
<small>(placeholder – siap dikembangkan)</small>
</div>
</div>

<footer class="footer">© 2026 • Achmad Teguh Ginanjar | 61762</footer>

<script>
const playlist = document.getElementById("playlist");
const player = document.getElementById("player");
let pdfDoc=null, scale=1.3, currentPage=1;
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const VIDEO_API="data/video.json";
const PDF_API="data/pdf.json";
const WAD_API="data/wad.json";

// VIDEO
fetch(VIDEO_API).then(r=>r.json()).then(data=>{
  playlist.innerHTML="";
  data.forEach((v,i)=>{
    const item=document.createElement("div");
    item.className="playlist-item";
    item.textContent=v.nama;
    item.onclick=()=>{document.querySelectorAll(".playlist-item").forEach(x=>x.classList.remove("active"));item.classList.add("active");player.src=v.file;player.play();}
    if(i===0){item.classList.add("active");player.src=v.file;}
    playlist.appendChild(item);
  });
});

// PDF
fetch(PDF_API).then(r=>r.json()).then(data=>{
  const list=document.getElementById("pdfList"); list.innerHTML="";
  data.forEach(p=>{
    const d=document.createElement("div");
    d.className="pdf-item"; d.textContent="📄 "+p.nama;
    d.onclick=()=>loadPDF(p.file);
    list.appendChild(d);
  });
});

// WAD
fetch(WAD_API).then(r=>r.json()).then(data=>console.log("WAD:",data));

// PDF smooth render
let renderQueue=[];
function loadPDF(u){pdfjsLib.getDocument(u).promise.then(pdf=>{pdfDoc=pdf;currentPage=1;renderQueue=[];renderNext();});}
function renderNext(){
  if(renderQueue.length===0 && pdfDoc){
    for(let i=1;i<=pdfDoc.numPages;i++) renderQueue.push(i);
  }
  if(renderQueue.length===0) return;
  const i=renderQueue.shift();
  pdfDoc.getPage(i).then(p=>{
    const vp=p.getViewport({scale});
    const c=document.createElement("canvas");
    c.width=vp.width;c.height=vp.height;
    document.getElementById("pdfViewer").appendChild(c);
    p.render({canvasContext:c.getContext("2d"),viewport:vp}).promise.then(()=>requestAnimationFrame(renderNext));
  });
}

function zoomIn(){scale+=0.2;clearPDF();renderNext();}
function zoomOut(){scale=Math.max(0.6,scale-0.2);clearPDF();renderNext();}
function clearPDF(){document.getElementById("pdfViewer").innerHTML="";}

function prevPage(){scrollPage(--currentPage);}
function nextPage(){scrollPage(++currentPage);}
function goPage(){scrollPage(+pageInput.value);}
function scrollPage(p){if(!pdfDoc)return;currentPage=Math.min(Math.max(1,p),pdfDoc.numPages);pdfViewer.children[currentPage-1]?.scrollIntoView();}
function toggleFullscreen(){const e=document.querySelector(".pdf-container");document.fullscreenElement?document.exitFullscreen():e.requestFullscreen();}

// TAB
document.querySelectorAll(".tab").forEach(tab=>{tab.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));tab.classList.add("active");document.getElementById(tab.dataset.tab).classList.add("active");});});
</script>

</body>
</html>
