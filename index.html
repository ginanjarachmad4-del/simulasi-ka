<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pusat Media Operasional KA</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:#e5e7eb;
margin:0;
padding:10px;
}

/* HEADER */

.header-logo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
gap:10px;
margin-bottom:10px;
}

.logo{
height:50px;
object-fit:contain;
justify-self:center;
}

h1{
text-align:center;
margin:5px 0;
font-size:1.4rem;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin:4px 0 10px 0;
font-size:.9rem;
}

/* TABS */

.tabs{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.tab{
padding:8px 14px;
border-radius:999px;
background:#020617;
border:1px solid #334155;
cursor:pointer;
font-size:.9rem;
}

.tab.active{
background:#2563eb;
}

.tab-content{
display:none;
margin-top:15px;
}

.tab-content.active{
display:block;
}

/* VIDEO */

.video-layout{
display:flex;
flex-direction:column;
gap:15px;
}

.playlist{
background:#020617;
border:1px solid #334155;
border-radius:12px;
max-height:300px;
overflow-y:auto;
}

.playlist-item{
padding:10px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.playlist-item:hover{
background:#1e293b;
}

.playlist-item.active{
background:#2563eb;
}

.player-wrapper{
position:relative;
width:100%;
padding-top:56.25%;
background:black;
border-radius:12px;
overflow:hidden;
}

.player-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* PDF LIST */

.pdf-list{
background:#020617;
border:1px solid #334155;
border-radius:12px;
max-height:300px;
overflow-y:auto;
}

.pdf-item{
padding:10px;
border-bottom:1px solid #334155;
cursor:pointer;
}

.pdf-item:hover{
background:#1e293b;
}

/* PDF MODAL */

#pdfModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:9999;
}

.pdf-modal-content{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
}

.pdf-topbar{
display:flex;
gap:10px;
padding:8px;
background:#020617;
border-bottom:1px solid #334155;
}

.pdf-topbar button{
background:#1e293b;
border:1px solid #334155;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

#closePdf{
margin-left:auto;
background:#ef4444;
}

#pdfFrame{
flex:1;
border:none;
width:100%;
}

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#94a3b8;
}
/* LANDING LOGIN */

#landing{
position:fixed;
width:100%;
height:100%;
background:url('https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/wp10514716-kereta-api-indonesia-wallpapers.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
transition:opacity .7s;
}

#landing.hidden{
opacity:0;
pointer-events:none;
}

#landing::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:black;
opacity:.35;
}

.overlay{
position:relative;
z-index:2;
text-align:center;
color:white;
}

.overlay h1{
font-size:2.2em;
margin-bottom:20px;
}

#enterBtn{
padding:12px 30px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-size:1.2em;
cursor:pointer;
}

.landing-logo{
position:absolute;
top:20px;
height:70px;
z-index:3;
}

.landing-logo.left{left:20px;}
.landing-logo.right{right:20px;}
  body{
font-family:Arial;
background:#0f172a;
color:#e5e7eb;
margin:0;
padding:10px;
overflow-x:hidden;
}
</style>
</head>

<body>
<!-- LANDING LOGIN -->

<div id="landing">

<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-danantara.png" class="landing-logo left">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/Logo%20KAI.png" class="landing-logo right">

<div class="overlay">

<h1>SELAMAT DATANG DI LABORATORIUM PUSDALOPKA 2 BANDUNG</h1>

<button id="enterBtn">Masuk</button>

</div>

</div>
<header>

<div class="header-logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-danantara.png" class="logo">
<img src="https://raw.githubusercontent.com/ginanjarachmad4-del/asset-logo/main/logo-KAI-orange-putih-1.png" class="logo">
</div>

<h1>🚆 Pusat Media Operasional KA</h1>
<p class="subtitle">Video • Peraturan • Informasi Penting</p>

</header>

<div class="tabs">

<div class="tab active" data-tab="video">🎬 VIDEO</div>
<div class="tab" data-tab="pdf">📄 PERATURAN DINAS</div>

</div>

<!-- VIDEO -->

<div class="tab-content active" id="video">

<div class="video-layout">

<div class="playlist" id="playlist">Loading...</div>

<div class="player-wrapper">
<iframe id="player"></iframe>
</div>

</div>

</div>

<!-- PDF -->

<div class="tab-content" id="pdf">

<div class="pdf-list" id="pdfList">Loading PDF...</div>

</div>

<footer class="footer">
© 2026 • Achmad Teguh Ginanjar
</footer>

<!-- PDF VIEWER -->

<div id="pdfModal">

<div class="pdf-modal-content">

<div class="pdf-topbar">

<button id="closePdf" onclick="closePDF()">✕ Tutup</button>
<button onclick="downloadPdf()">⬇ Download</button>

</div>

<iframe id="pdfFrame"></iframe>

</div>

</div>

<script>

/* VIDEO */

const playlist=document.getElementById("playlist");
const player=document.getElementById("player");

const VIDEO_API="https://raw.githubusercontent.com/ginanjarachmad4-del/youtube-json/main/videos.json?v="+Date.now();

fetch(VIDEO_API)
.then(r=>r.json())
.then(data=>{

playlist.innerHTML="";

data.forEach((v,i)=>{

const item=document.createElement("div");

item.className="playlist-item";
item.textContent=v.nama;

item.onclick=()=>{

document.querySelectorAll(".playlist-item").forEach(x=>x.classList.remove("active"));

item.classList.add("active");

player.src=v.file;

};

if(i===0){
item.classList.add("active");
player.src=v.file;
}

playlist.appendChild(item);

});

});

/* PDF LIST */

fetch("data/pdf.json")
.then(r=>r.json())
.then(data=>{

const list=document.getElementById("pdfList");

list.innerHTML="";

data.forEach(p=>{

const d=document.createElement("div");

d.className="pdf-item";
d.textContent="📄 "+p.nama;

d.onclick=()=>openPDF(p.file);

list.appendChild(d);

});

});

/* PDF VIEWER */

let currentPdf="";

function openPDF(url){

currentPdf=url;

const viewer="https://mozilla.github.io/pdf.js/web/viewer.html?file="+encodeURIComponent(url);

document.getElementById("pdfFrame").src=viewer;

document.getElementById("pdfModal").style.display="block";

}

function closePDF(){

document.getElementById("pdfModal").style.display="none";

document.getElementById("pdfFrame").src="";

}

function downloadPdf(){

window.open(currentPdf);

}

/* TABS */

document.querySelectorAll(".tab").forEach(tab=>{

tab.onclick=()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

tab.classList.add("active");

document.getElementById(tab.dataset.tab).classList.add("active");

};

});
  /* LANDING LOGIN */

document.getElementById("enterBtn").onclick=()=>{

const landing=document.getElementById("landing");

landing.classList.add("hidden");

setTimeout(()=>{
landing.style.display="none";
},700);

};

</script>

</body>
</html>
